<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Miduva — We Build Custom Growth Systems</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>tailwind.config={darkMode:'class'}</script>
<style>
  :root{
    --navy-900:#0F2349;
    --navy-800:#162B57;
    --navy-700:#1E3A6E;
    --navy-600:#2A4A86;
    --teal-500:#2BC8B7;
    --teal-400:#4FD6C7;
    --teal-300:#8EE5DB;
    --teal-50:#E6FAF7;
    --ink:#0B1B3A;
    --paper:#F6F8FC;
    --paper-2:#EEF2F9;
    --line:#E2E8F2;
    --muted:#5A6B88;
    --card:#ffffff;
    --card-2:#F6F8FC;
    --chip:rgba(15,35,73,.05);
  }
  html.dark{
    --navy-900:#F0F4FF;
    --navy-800:#D8E2F8;
    --navy-700:#ADBFE8;
    --navy-600:#7A9AD0;
    --ink:#F0F4FF;
    --paper:#02060F;
    --paper-2:#040A18;
    --line:rgba(255,255,255,.06);
    --muted:#6E85A8;
    --card:#060E1E;
    --card-2:#040A17;
    --chip:rgba(255,255,255,.05);
    --teal-50:rgba(43,200,183,.10);
  }
  html,body{background:var(--paper);color:var(--ink);transition:background .4s ease;}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;font-feature-settings:"ss01","cv11";}
  .mono{font-family:'JetBrains Mono',monospace;}
  .grain{background-image:radial-gradient(rgba(15,35,73,.05) 1px,transparent 1px);background-size:3px 3px;}
  .text-teal{color:var(--teal-500);}
  .bg-teal{background:var(--teal-500);}
  .bg-navy{background:var(--navy-900);}
  .text-navy{color:var(--navy-900);}
  .ring-teal{--tw-ring-color:var(--teal-500);}
  .btn-primary{background:linear-gradient(180deg,#1E3A6E 0%,#0F2349 100%);color:#fff;}
  .btn-primary:hover{background:linear-gradient(180deg,#24467f 0%,#13295a 100%);}
  html.dark .btn-primary{background:linear-gradient(180deg,#2BC8B7 0%,#1FA394 100%);color:#06142F;}
  html.dark .btn-primary:hover{background:linear-gradient(180deg,#3FD8C7 0%,#2BC8B7 100%);}
  .pulse-dot{box-shadow:0 0 0 0 rgba(43,200,183,.6);animation:pulse 2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(43,200,183,.55);}70%{box-shadow:0 0 0 10px rgba(43,200,183,0);}100%{box-shadow:0 0 0 0 rgba(43,200,183,0);}}
  .scroll-mask{mask-image:linear-gradient(90deg,transparent,#000 10%,#000 90%,transparent);}
  .ticker{animation:ticker 40s linear infinite;}
  @keyframes ticker{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  .rise{animation:rise .9s cubic-bezier(.2,.7,.2,1) both;}
  .rise-2{animation:rise .9s .15s cubic-bezier(.2,.7,.2,1) both;}
  .rise-3{animation:rise .9s .3s cubic-bezier(.2,.7,.2,1) both;}
  .rise-4{animation:rise .9s .45s cubic-bezier(.2,.7,.2,1) both;}
  .rise-5{animation:rise .9s .6s cubic-bezier(.2,.7,.2,1) both;}
  @keyframes rise{from{opacity:0;transform:translateY(14px) blur(8px);filter:blur(8px);}to{opacity:1;transform:translateY(0);filter:blur(0);}}
  .float{animation:float 7s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
  .shine{background:linear-gradient(110deg,#2BC8B7 10%,#8EE5DB 40%,#2BC8B7 60%);background-size:200% 100%;animation:shine 6s linear infinite;-webkit-background-clip:text;background-clip:text;color:transparent;}
  @keyframes shine{to{background-position:-200% 0;}}
  .bar-grow{transform-origin:bottom;animation:bar 2.2s cubic-bezier(.2,.7,.2,1) both;}
  @keyframes bar{from{transform:scaleY(.1);}to{transform:scaleY(1);}}
  .dashed-sep{background-image:linear-gradient(90deg,rgba(15,35,73,.25) 50%,transparent 50%);background-size:8px 1px;background-repeat:repeat-x;}
  html.dark .dashed-sep{background-image:linear-gradient(90deg,rgba(255,255,255,.15) 50%,transparent 50%);}
  html.dark .grain{background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);}
  .dash-fade-y{mask-image:linear-gradient(to bottom,black 50%,transparent 100%);-webkit-mask-image:linear-gradient(to bottom,black 50%,transparent 100%);}
  .dash-fade-x{mask-image:linear-gradient(to right,black 50%,transparent 100%);-webkit-mask-image:linear-gradient(to right,black 50%,transparent 100%);}
  html.dark .pulse-dot{box-shadow:0 0 0 0 rgba(43,200,183,.7);}
  #cta a,#cta div>a{white-space:nowrap;}
  .phrase-wrap{display:inline-block;transition:opacity .38s ease,transform .38s ease,filter .38s ease;}
  .phrase-wrap.p-in{opacity:1;transform:translateY(0);filter:blur(0);}
  .phrase-wrap.p-out{opacity:0;transform:translateY(-14px);filter:blur(8px);}
  /* Scroll-stack */
  .scroll-stack{position:relative;}
  .scroll-stack.on{height:200vh;}
  .scroll-panel{position:sticky;top:0;height:100vh;display:flex;align-items:center;justify-content:center;will-change:transform;transform-origin:center top;}
  .scroll-panel.p1{z-index:1;}
  .scroll-panel.p2{z-index:2;}
  .scroll-panel-inner{width:100%;max-height:100vh;overflow:hidden;}
  .scroll-stack.on .scroll-panel.p2{background:var(--paper);border-top:1px solid var(--line);box-shadow:0 -30px 60px -20px rgba(15,35,73,.18);border-top-left-radius:32px;border-top-right-radius:32px;}
  html.dark .scroll-stack.on .scroll-panel.p2{box-shadow:0 -30px 60px -20px rgba(0,0,0,.6);}
  .scroll-hint{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--muted);font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;animation:scroll-hint 2.4s ease-in-out infinite;pointer-events:none;}
  @keyframes scroll-hint{0%,100%{transform:translate(-50%,0);opacity:.6;}50%{transform:translate(-50%,6px);opacity:1;}}
  /* Parallax */
  .parallax{position:relative;}
  .parallax__header{position:relative;height:140vh;}
  .parallax__visuals{position:sticky;top:0;height:100vh;overflow:hidden;}
  .parallax__layers{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
  .parallax__layer{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;will-change:transform;}
  .parallax__title{font-size:clamp(80px,18vw,260px);font-weight:800;letter-spacing:-0.055em;line-height:.9;color:var(--navy-900);text-align:center;margin:0;font-family:'Plus Jakarta Sans',sans-serif;}
  .parallax__title em{font-style:normal;color:var(--teal-500);}
  .parallax__fade{position:absolute;inset:auto 0 0 0;height:30%;background:linear-gradient(to bottom,transparent,var(--paper));pointer-events:none;}
  .parallax__blob{position:absolute;border-radius:999px;filter:blur(80px);opacity:.55;}
  .parallax__content{position:relative;padding:90px 24px 120px;display:flex;flex-direction:column;align-items:center;gap:20px;text-align:center;background:var(--paper);}
  .parallax__content .mark{width:56px;height:56px;color:var(--teal-500);}
  /* Services section */
  .svc-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transform:scale(1.07);transition:opacity .75s cubic-bezier(.33,1,.68,1),transform .75s cubic-bezier(.33,1,.68,1);}
  .svc-img.svc-active{opacity:1;transform:scale(1);}
  .svc-row{transition:opacity .25s ease,transform .25s ease;}
  @keyframes tag-in{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .svc-tag{animation:tag-in .4s ease both;}
  @keyframes line-grow{from{transform:scaleX(0);}to{transform:scaleX(1);}}
  .svc-line{transform-origin:left;animation:line-grow .5s cubic-bezier(.33,1,.68,1) both;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useRef } = React;

function Logo({className=""}){
  return <img src="assets/miduva-logo.png" alt="Miduva" className={className} />;
}

function Nav({theme,setTheme}){
  const [scrolled,setScrolled]=useState(false);
  const [open,setOpen]=useState(false);
  useEffect(()=>{
    const on=()=>setScrolled(window.scrollY>30);
    window.addEventListener('scroll',on);return()=>window.removeEventListener('scroll',on);
  },[]);
  const items=[
    {n:"Services",h:"#services"},
    {n:"Systems",h:"#systems"},
    {n:"Case Studies",h:"#cases"},
    {n:"About",h:"#about"},
  ];
  return (
    <header className="fixed top-0 inset-x-0 z-40 px-3">
      <nav className={`mx-auto mt-3 border rounded-2xl transition-all duration-500 ${scrolled?'max-w-4xl bg-[var(--card)]/75 backdrop-blur-xl border-[var(--line)] shadow-[0_10px_40px_-20px_rgba(15,35,73,.25)] dark:shadow-[0_10px_40px_-20px_rgba(0,0,0,.6)]':'max-w-6xl bg-transparent border-transparent shadow-none backdrop-blur-none'}`}>
        <div className="flex items-center justify-between px-5 py-3">
          <a href="#" className="flex items-center gap-2">
            <Logo className="h-7 w-auto"/>
          </a>
          <ul className={`hidden lg:flex items-center gap-8 text-[13.5px] font-medium ${scrolled ? 'text-[var(--muted)]' : 'text-white/80'}`}>
            {items.map(i=>(
              <li key={i.n}><a href={i.h} className={`transition ${scrolled ? 'hover:text-[var(--navy-900)]' : 'hover:text-white'}`}>{i.n}</a></li>
            ))}
          </ul>
          <div className="hidden lg:flex items-center gap-2">
            <button onClick={()=>setTheme(theme==='dark'?'light':'dark')} aria-label="Toggle theme" className={`h-9 w-9 rounded-xl flex items-center justify-center transition hover:text-[var(--teal-500)] ${scrolled ? 'border border-[var(--line)] bg-[var(--chip)] text-[var(--navy-900)]' : 'text-white/80 hover:text-white'}`}>
              {theme==='dark' ? (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
              ) : (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
              )}
            </button>
            <a href="#" className={`text-sm font-medium px-4 py-2 rounded-xl transition ${scrolled ? 'text-[var(--navy-900)] hover:bg-[var(--paper-2)]' : 'text-white/80 hover:text-white'}`}>Client Login</a>
            <a href="#cta" className="text-sm font-semibold px-4 py-2 rounded-xl btn-primary inline-flex items-center gap-2">
              Book a Call
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
            </a>
          </div>
          <div className="lg:hidden flex items-center gap-2">
            <button onClick={()=>setTheme(theme==='dark'?'light':'dark')} aria-label="Toggle theme" className="h-9 w-9 rounded-lg border border-[var(--line)] flex items-center justify-center text-[var(--navy-900)]">
              {theme==='dark' ? <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg> : <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>}
            </button>
            <button onClick={()=>setOpen(!open)} className="p-2 rounded-lg border border-[var(--line)]" aria-label="menu">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
            </button>
          </div>
        </div>
        {open && (
          <div className="lg:hidden px-5 pb-5 border-t border-[var(--line)] pt-3 space-y-3">
            {items.map(i=><a key={i.n} href={i.h} className="block text-[var(--muted)] text-sm">{i.n}</a>)}
            <a href="#cta" className="block text-center text-sm font-semibold px-4 py-2 rounded-xl btn-primary">Book a Call</a>
          </div>
        )}
      </nav>
    </header>
  );
}

function Headline(){
  const phrases = ["generate leads.", "drive sales.", "scale your business."];
  const [idx, setIdx] = useState(0);
  const [visible, setVisible] = useState(true);
  useEffect(() => {
    const t = setInterval(() => {
      setVisible(false);
      setTimeout(() => { setIdx(i => (i + 1) % phrases.length); setVisible(true); }, 380);
    }, 2800);
    return () => clearInterval(t);
  }, []);
  return (
    <h1 className="t-heading rise-2 mt-8 max-w-5xl mx-auto text-center text-[40px] leading-[1.15] sm:text-[56px] md:text-[68px] lg:text-[76px] font-extrabold tracking-[-0.035em] text-[var(--navy-900)]">
      We build <span className="relative inline-block">
        <span className="relative z-10">custom growth</span>
        <svg aria-hidden className="absolute -bottom-1 left-0 w-full" viewBox="0 0 300 14" preserveAspectRatio="none" height="12">
          <path d="M2 9 C 70 2, 150 2, 298 8" stroke="var(--teal-500)" strokeWidth="4" fill="none" strokeLinecap="round"/>
        </svg>
      </span>{' '}
      <span className="text-[var(--navy-700)]">systems</span> that
      <span className="block mt-1">
        <span className={`phrase-wrap inline-block ${visible ? 'p-in' : 'p-out'}`}>
          <span className="shine">{phrases[idx]}</span>
        </span>
      </span>
    </h1>
  );
}

function Sub(){
  return (
    <p className="rise-3 mx-auto text-center mt-7 max-w-2xl text-[17px] md:text-[19px] leading-[1.55] text-[var(--muted)] text-balance">
      No generic services. We design tailored systems using <span className="text-[var(--navy-900)] font-semibold">ads, funnels, automation &amp; data</span> to grow your business — engineered end-to-end, owned by you.
    </p>
  );
}

function CTAs(){
  return (
    <div id="cta" className="rise-4 mt-10 flex flex-col sm:flex-row items-center justify-center gap-3">
      <div className="bg-gradient-to-b from-[var(--teal-300)]/60 to-[var(--teal-500)]/30 p-[2px] rounded-2xl shadow-[0_15px_40px_-15px_rgba(43,200,183,.5)]">
        <a href="#" className="inline-flex items-center gap-2.5 px-6 py-3.5 rounded-[14px] btn-primary font-semibold text-[15px] tracking-tight">
          <span className="inline-block">🔥</span>
          Book a Free Strategy Call
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </a>
      </div>
      <a href="#" className="group inline-flex items-center gap-2 px-6 py-3.5 rounded-2xl border border-[var(--line)] bg-[var(--card)] hover:bg-[var(--paper-2)] font-semibold text-[15px] text-[var(--navy-900)] transition">
        Get Your Free Growth Plan
        <span className="mono text-[11px] text-[var(--muted)] border border-[var(--line)] rounded-md px-1.5 py-0.5 group-hover:border-[var(--teal-500)] group-hover:text-[var(--teal-500)] transition">PDF</span>
      </a>
    </div>
  );
}

function MetaStrip(){
  const items=[
    {k:"Avg. ROAS",v:"4.8×"},
    {k:"Lead volume",v:"+312%"},
    {k:"Time to launch",v:"14 days"},
    {k:"Client retention",v:"94%"},
  ];
  return (
    <div className="rise-5 mt-12 mx-auto max-w-3xl grid grid-cols-2 md:grid-cols-4 gap-px bg-[var(--line)] rounded-2xl overflow-hidden border border-[var(--line)]">
      {items.map((it,i)=>(
        <div key={i} className="bg-[var(--card)]/70 backdrop-blur px-5 py-4 text-center">
          <div className="text-[11px] mono uppercase tracking-[0.14em] text-[var(--muted)]">{it.k}</div>
          <div className="mt-1 text-[22px] font-bold text-[var(--navy-900)] tracking-tight">{it.v}</div>
        </div>
      ))}
    </div>
  );
}

function Dashboard(){
  const bars=[42,58,51,64,72,69,81,88,83,92,97,104];
  return (
    <div className="relative mx-auto max-w-7xl dash-fade-y">
      <div className="dash-fade-x -mr-16 pl-16 lg:-mr-56 lg:pl-56" style={{perspective:'1200px'}}>
        <div style={{transform:'rotateX(18deg)'}}>
          <div className="relative" style={{transform:'skewX(.22rad)'}}>
      <div className="relative rounded-[26px] p-2 bg-gradient-to-b from-[var(--card)] to-[var(--card-2)] border border-[var(--line)] shadow-[0_40px_80px_-30px_rgba(15,35,73,.35)] dark:shadow-[0_40px_80px_-30px_rgba(0,0,0,.7)]">
        <div className="rounded-[20px] bg-[var(--card)] overflow-hidden border border-[var(--line)]">
          {/* Chrome */}
          <div className="flex items-center gap-2 px-4 py-3 border-b border-[var(--line)] bg-[var(--card-2)]">
            <span className="h-2.5 w-2.5 rounded-full bg-[#FF6159]"></span>
            <span className="h-2.5 w-2.5 rounded-full bg-[#FFBD2E]"></span>
            <span className="h-2.5 w-2.5 rounded-full bg-[#28C940]"></span>
            <div className="ml-4 mono text-[11px] text-[var(--muted)] flex items-center gap-2">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 1 1 10 0v4"/></svg>
              app.miduva.systems / growth-os
            </div>
            <div className="ml-auto flex items-center gap-2 mono text-[10px] text-[var(--muted)]">
              <span className="inline-flex items-center gap-1.5"><span className="h-1.5 w-1.5 rounded-full bg-[var(--teal-500)]"></span>LIVE</span>
              <span className="hidden sm:inline">· synced 12s ago</span>
            </div>
          </div>
          {/* Body */}
          <div className="grid grid-cols-12 gap-0">
            {/* Sidebar */}
            <aside className="hidden md:block col-span-2 border-r border-[var(--line)] bg-[var(--card-2)] p-4 space-y-4">
              <div>
                <div className="mono text-[9px] uppercase tracking-[0.14em] text-[var(--muted)] mb-2">System</div>
                {["Overview","Ads","Funnels","Automation","Data","Reports"].map((n,i)=>(
                  <div key={n} className={`flex items-center gap-2 text-[12px] py-1.5 px-2 rounded-md ${i===0?'bg-[var(--card)] text-[var(--navy-900)] font-semibold border border-[var(--line)]':'text-[var(--muted)]'}`}>
                    <span className={`h-1.5 w-1.5 rounded-full ${i===0?'bg-[var(--teal-500)]':'bg-[var(--line)]'}`}></span>
                    {n}
                  </div>
                ))}
              </div>
              <div className="pt-3 border-t border-[var(--line)]">
                <div className="mono text-[9px] uppercase tracking-[0.14em] text-[var(--muted)] mb-2">Clients</div>
                <div className="space-y-1.5 text-[11px] text-[var(--muted)]">
                  <div className="flex items-center gap-2"><span className="h-4 w-4 rounded-md bg-[var(--teal-500)]/15 text-[var(--teal-500)] text-[8px] font-bold flex items-center justify-center">AR</span>Arvo Labs</div>
                  <div className="flex items-center gap-2"><span className="h-4 w-4 rounded-md bg-[var(--navy-700)]/10 text-[var(--navy-700)] text-[8px] font-bold flex items-center justify-center">NV</span>Novae</div>
                  <div className="flex items-center gap-2"><span className="h-4 w-4 rounded-md bg-[#F5B84C]/20 text-[#C17A00] text-[8px] font-bold flex items-center justify-center">KL</span>Kilo &amp; Co</div>
                </div>
              </div>
            </aside>

            {/* Main */}
            <section className="col-span-12 md:col-span-10 p-5 lg:p-6">
              {/* Top KPI row */}
              <div className="flex flex-wrap items-end justify-between gap-3 mb-4">
                <div>
                  <div className="mono text-[10px] uppercase tracking-[0.14em] text-[var(--muted)]">Growth System · Arvo Labs</div>
                  <div className="text-[19px] font-bold text-[var(--navy-900)] tracking-tight">Q2 Performance Overview</div>
                </div>
                <div className="flex items-center gap-2">
                  {["7d","30d","QTD","YTD"].map((t,i)=>(
                    <button key={t} className={`text-[11px] mono px-2.5 py-1 rounded-md border ${i===2?'bg-[var(--navy-700)] text-[var(--card)] border-[var(--navy-700)]':'border-[var(--line)] text-[var(--muted)]'}`}>{t}</button>
                  ))}
                </div>
              </div>
              <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-5">

function ScrollStack({panel1,panel2}){
  const ref=useRef(null);
  const p1=useRef(null);
  const p2=useRef(null);
  useEffect(()=>{
    let raf=0;
    const update=()=>{
      raf=0;
      const el=ref.current;
      if(!el) return;
      const rect=el.getBoundingClientRect();
      const total=el.offsetHeight-window.innerHeight;
      const progressed=Math.min(1,Math.max(0,-rect.top/total));
      const s1=1-progressed*0.2;
      const r1=progressed*-5;
      const s2=0.8+progressed*0.2;
      const r2=5-progressed*5;
      if(p1.current) p1.current.style.transform=`scale(${s1}) rotate(${r1}deg)`;
      if(p2.current) p2.current.style.transform=`scale(${s2}) rotate(${r2}deg)`;
    };
    const onScroll=()=>{ if(!raf) raf=requestAnimationFrame(update); };
    update();
    window.addEventListener('scroll',onScroll,{passive:true});
    window.addEventListener('resize',onScroll);
    return ()=>{
      window.removeEventListener('scroll',onScroll);
      window.removeEventListener('resize',onScroll);
      if(raf) cancelAnimationFrame(raf);
    };
  },[]);
  return (
    <div ref={ref} className="scroll-stack on">
      <section className="scroll-panel p1" ref={p1}>
        <div className="scroll-panel-inner">{panel1}</div>
        <div className="scroll-hint" aria-hidden>
          <span>Scroll</span>
          <svg width="14" height="18" viewBox="0 0 14 18" fill="none" stroke="currentColor" strokeWidth="1.6"><rect x="1" y="1" width="12" height="16" rx="6"/><path d="M7 5v3" strokeLinecap="round"/></svg>
        </div>
      </section>
      <section className="scroll-panel p2" ref={p2}>
        <div className="scroll-panel-inner">{panel2}</div>
      </section>
    </div>
  );
}

function Parallax(){
  const ref=useRef(null);
  useEffect(()=>{
    let raf=0;
    const update=()=>{
      raf=0;
      const el=ref.current;
      if(!el) return;
      const layers=el.querySelector('[data-parallax-layers]');
      const header=el.querySelector('.parallax__header');
      if(!layers||!header) return;
      const rect=header.getBoundingClientRect();
      const scrollable=header.offsetHeight-window.innerHeight;
      if(scrollable<=0) return;
      const p=Math.min(1,Math.max(0,-rect.top/scrollable));
      const config=[
        {sel:'[data-parallax-layer="1"]',y:-90},
        {sel:'[data-parallax-layer="2"]',y:-55},
        {sel:'[data-parallax-layer="3"]',y:-22},
        {sel:'[data-parallax-layer="4"]',y:-6},
      ];
      config.forEach(c=>{
        const n=layers.querySelector(c.sel);
        if(n) n.style.transform=`translateY(${p*c.y}%)`;
      });
    };
    const onScroll=()=>{ if(!raf) raf=requestAnimationFrame(update); };
    update();
    window.addEventListener('scroll',onScroll,{passive:true});
    window.addEventListener('resize',onScroll);
    return ()=>{
      window.removeEventListener('scroll',onScroll);
      window.removeEventListener('resize',onScroll);
      if(raf) cancelAnimationFrame(raf);

                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
              </a>
            </div>
          </div>

          {/* Right — image panel */}
          <div className="w-full lg:w-[400px] xl:w-[460px] flex-shrink-0 sticky top-24 self-start">
            <div className="relative rounded-[28px] overflow-hidden" style={{aspectRatio:'3/4'}}>
              {/* Stacked images */}
              {SERVICES.map((svc,idx)=>(
                <img
                  key={idx}
                  src={svc.imageUrl}
                  alt={svc.title}
                  className={`svc-img${active===idx ? ' svc-active' : ''}`}
                  loading={idx===0?'eager':'lazy'}
                  decoding="async"
                />
              ))}
              {/* Vignette overlay */}
              <div className="absolute inset-0 pointer-events-none" style={{background:'linear-gradient(to top,rgba(6,20,47,.88) 0%,rgba(6,20,47,.25) 45%,transparent 75%)'}}/>

              {/* Service label top-left */}
              <div className="absolute top-5 left-5 flex items-center gap-2">
                <span className="text-lg">{SERVICES[active].emoji}</span>
                <span className="mono text-[11px] uppercase tracking-[0.16em] text-white/70">{SERVICES[active].title}</span>
              </div>

              {/* Count badge top-right */}
              <div className="absolute top-5 right-5 mono text-[11px] text-white/60 bg-white/10 backdrop-blur-sm border border-white/15 rounded-full px-3 py-1">
                {SERVICES[active].count} services
              </div>

              {/* Bottom: animated service chips */}
              <div className="absolute bottom-0 inset-x-0 p-6">
                <div key={active} className="flex flex-wrap gap-2">
                  {SERVICES[active].items.map((item,i)=>(
                    <span
                      key={i}
                      className="svc-tag text-[11.5px] font-medium text-white/90 bg-white/10 backdrop-blur-sm border border-white/15 rounded-full px-3 py-1.5"
                      style={{animationDelay:`${i*0.07}s`}}
                    >
                      {item}
                    </span>
                  ))}
                </div>
                {/* Active indicator line */}
                <div className="mt-5 flex gap-1.5">
                  {SERVICES.map((_,i)=>(
                    <div
                      key={i}
                      className="h-[3px] rounded-full flex-1 transition-all duration-500"
                      style={{background: active===i ? 'var(--teal-500)' : 'rgba(255,255,255,.18)'}}
                    />
                  ))}
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </section>
  );
}

function App(){
  const [theme,setTheme]=useState('dark');
  useEffect(()=>{
    const root=document.documentElement;
    if(theme==='dark') root.classList.add('dark'); else root.classList.remove('dark');
  },[theme]);

  return (
    <div className="relative min-h-screen overflow-x-clip">
      <Nav theme={theme} setTheme={setTheme}/>
      <main>
        <ParallaxHero theme={theme}/>
        <div className="px-6 py-16">
          <div className="max-w-6xl mx-auto p-3 rounded-[32px] border-2 border-dashed border-[var(--line)]">
            <Dashboard/>
          </div>
        </div>
        <Services/>
        <Parallax/>
        <SystemRibbon/>
        <div className="mt-24 md:mt-32 max-w-6xl mx-auto px-6 pb-24">
          <div className="dashed-sep h-px w-full mb-8"></div>
          <div className="flex flex-wrap items-center justify-between gap-4">
            <div className="mono text-[11px] uppercase tracking-[0.18em] text-[var(--muted)]">Trusted by operators at</div>
            <div className="flex flex-wrap items-center gap-x-10 gap-y-4 opacity-70">
              {["ARVO","NOVAE","KILO&CO","HELIX","PARTTWO","LUMEN"].map(n=>(
                <span key={n} className="font-extrabold tracking-[0.12em] text-[15px] text-[var(--navy-900)]/80">{n}</span>
              ))}
            </div>
          </div>
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
